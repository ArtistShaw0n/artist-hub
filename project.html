<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project - Artist Hub</title>
<meta name="description" content="Artist Hub dashboard — every project's stage, links, assets and status in one command center.">
<meta name="theme-color" content="#08080b">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta property="og:title" content="Artist Hub — studio dashboard">
<meta property="og:description" content="The command center: every project's stage, links and status at a glance.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://artist-shawon-hub.vercel.app/dashboard.html">
<meta name="twitter:card" content="summary">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
<script>document.documentElement.classList.add('jsd')</script>
<style>
*{box-sizing:border-box}
html,body{margin:0;background:#08080b}
body{font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.skip{position:absolute;left:-9999px;top:8px;z-index:100;background:#141419;border:1px solid rgba(255,255,255,.16);color:#f4f4f6;padding:8px 14px;border-radius:10px;font-size:13px}
.skip:focus{left:16px}
:focus-visible{outline:2px solid #d6ff4f;outline-offset:2px;border-radius:6px}
.ah{--bg:#08080b;--card:#141419;--card2:#1b1b22;--line:rgba(255,255,255,.08);--line2:rgba(255,255,255,.16);--tx:#f4f4f6;--tx2:#a3a3ae;--tx3:#8a8a96;--accent:#6d5efc;--accent-soft:#a78bfa;--violet:#6d5efc;--lime:#d6ff4f;--pink:#ec4899;--amber:#fbbf24;--grad:linear-gradient(100deg,#a78bfa,#6d5efc);--grad-soft:linear-gradient(135deg,#6d5efc,#8b7cff);--spring:cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden;background:var(--bg);color:var(--tx);line-height:1.5;width:100%;min-height:100vh}
.ah *{box-sizing:border-box}
.ah .inner{position:relative;z-index:1;max-width:1160px;margin:0 auto}
.ah a{text-decoration:none;color:inherit}
.glow{position:absolute;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0}
.ga{width:480px;height:480px;background:radial-gradient(circle,#7c5cff,transparent 70%);opacity:.40;top:-200px;left:-150px;animation:fa 16s ease-in-out infinite}
.gb{width:440px;height:440px;background:radial-gradient(circle,#4f46e5,transparent 70%);opacity:.22;top:30px;right:-190px;animation:fb 20s ease-in-out infinite}
@keyframes fa{50%{transform:translate(40px,30px)}}
@keyframes fb{50%{transform:translate(-30px,40px)}}
.nav{position:relative;z-index:2;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 24px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:9px;font-weight:600;font-size:16px;letter-spacing:-.02em;color:var(--tx)}
.logomark{flex:none;color:var(--tx)}
.nlinks{display:flex;gap:4px}
.nlink{font-size:13px;color:var(--tx2);padding:7px 11px;border-radius:9px;transition:.25s}
.nlink:hover{color:var(--tx);background:rgba(255,255,255,.05)}
.nlink.on{color:var(--tx)}
.nlink.off{opacity:.45;cursor:default}
.nlinks .nlink:hover{background:transparent}
/* liquid-glass morphing selector */
.lg-group{position:relative}
.lg-group > :not(.lg-pill){position:relative;z-index:1}
.lg-pill{position:absolute;top:0;left:0;border-radius:10px;background:rgba(255,255,255,.10);backdrop-filter:blur(12px) saturate(170%);-webkit-backdrop-filter:blur(12px) saturate(170%);border:1px solid rgba(255,255,255,.18);box-shadow:inset 0 1px 0 rgba(255,255,255,.3),0 6px 16px -8px rgba(0,0,0,.6);pointer-events:none;z-index:0;opacity:0;transition:transform .42s cubic-bezier(.34,1.4,.5,1),width .42s cubic-bezier(.34,1.4,.5,1),height .3s ease,opacity .25s}
.iconset{display:flex;gap:9px}
.iconset .ib{background:transparent!important;backdrop-filter:none!important;-webkit-backdrop-filter:none!important;border-color:transparent!important}
.iconset .ib:hover{background:transparent!important;transform:none!important}
.nright{display:flex;align-items:center;gap:9px}
.ib{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:transparent;color:var(--tx2);display:grid;place-items:center;cursor:pointer;transition:.25s;font-size:17px}
.ib:hover{color:var(--tx);border-color:var(--line2);background:rgba(255,255,255,.04)}
.cta{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:500;color:#0b0b0d;background:var(--lime);border:none;padding:9px 14px;border-radius:999px;cursor:pointer;transition:transform .4s var(--spring),filter .25s}
.cta:hover{transform:translateY(-2px);filter:brightness(1.06)}
.badge{position:relative;isolation:isolate;display:grid;place-items:center;width:42px;height:34px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:1.1px;color:var(--lime);background:transparent;background-image:repeating-linear-gradient(119deg,rgba(214,255,79,.14) 0 1px,transparent 1px 5px);border:none;border-radius:0;padding:0;cursor:pointer;transition:color .2s .15s}
.badge::before{content:"";position:absolute;inset:-1px;pointer-events:none;z-index:1;background-image:linear-gradient(to right,var(--lime) 8px,transparent 8px,transparent calc(100% - 8px),var(--lime) calc(100% - 8px)),linear-gradient(to right,var(--lime) 8px,transparent 8px,transparent calc(100% - 8px),var(--lime) calc(100% - 8px)),linear-gradient(var(--lime) 8px,transparent 8px,transparent calc(100% - 8px),var(--lime) calc(100% - 8px)),linear-gradient(var(--lime) 8px,transparent 8px,transparent calc(100% - 8px),var(--lime) calc(100% - 8px));background-size:100% 1px,100% 1px,1px 100%,1px 100%;background-position:0 0,0 100%,0 0,100% 0;background-repeat:no-repeat}
.badge::after{content:"";position:absolute;inset:0;background:var(--lime);clip-path:polygon(-1% 0,-1% 0,-100% 100%,-1% 100%);transition:clip-path .4s cubic-bezier(.25,0,0,1);z-index:-1;pointer-events:none}
.badge:hover,.badge:focus-visible{color:#0b0b0d}
.badge:hover::after,.badge:focus-visible::after{clip-path:polygon(0 0,200% 0,100% 100%,0 100%)}
.profile-slot{display:flex;align-items:center;gap:8px}
.profile-slot .badge-ios{display:none}
.profile-slot[data-style="glass"] .badge{display:none}
.profile-slot[data-style="glass"] .badge-ios{display:grid}
.styletoggle{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:transparent;color:var(--tx3);display:grid;place-items:center;cursor:pointer;font-size:15px;transition:.25s}
.styletoggle:hover{color:var(--tx);border-color:var(--line2);background:rgba(255,255,255,.04)}
.badge-ios{position:relative;width:38px;height:38px;border-radius:50%;display:grid;place-items:center;font-family:'Inter',sans-serif;font-weight:600;font-size:13px;color:#fff;background:linear-gradient(160deg,rgba(255,255,255,.22),rgba(255,255,255,.06));backdrop-filter:blur(14px) saturate(180%);-webkit-backdrop-filter:blur(14px) saturate(180%);border:1px solid rgba(255,255,255,.25);box-shadow:0 8px 22px -6px rgba(0,0,0,.55),inset 0 1px 1px rgba(255,255,255,.55),inset 0 -7px 12px -7px rgba(214,255,79,.25);overflow:hidden;cursor:pointer;transition:transform .55s cubic-bezier(.34,1.56,.64,1),box-shadow .4s ease,background .4s ease;-webkit-tap-highlight-color:transparent}
.badge-ios::before{content:"";position:absolute;inset:0;border-radius:inherit;background:radial-gradient(120% 80% at 30% 12%,rgba(255,255,255,.55),transparent 55%);opacity:.7;pointer-events:none;transition:opacity .4s ease,transform .6s cubic-bezier(.32,.72,0,1)}
.badge-ios span{position:relative;z-index:1}
.badge-ios:hover,.badge-ios:focus-visible{transform:scale(1.09);background:linear-gradient(160deg,rgba(255,255,255,.3),rgba(255,255,255,.1));box-shadow:0 14px 30px -8px rgba(0,0,0,.6),inset 0 1px 1px rgba(255,255,255,.6),inset 0 -8px 14px -7px rgba(214,255,79,.35)}
.badge-ios:hover::before,.badge-ios:focus-visible::before{transform:translate(8%,6%) scale(1.12);opacity:.95}
.badge-ios:active{transform:scale(.9);transition:transform .14s ease}
.hero{position:relative;z-index:1;padding:54px 24px 8px}
.eye{font-family:'JetBrains Mono',monospace;font-size:11.5px;letter-spacing:.2em;color:var(--tx3);margin:0 0 16px;display:flex;align-items:center;gap:10px}
.eye::before{content:"";width:26px;height:1px;background:var(--line2)}
.h1{font-size:clamp(34px,5vw,58px);line-height:1.05;font-weight:600;letter-spacing:-.035em;margin:0;max-width:760px}
.grad{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{font-size:16px;color:var(--tx2);max-width:520px;margin:20px 0 0;line-height:1.6}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;padding:34px 24px 6px;position:relative;z-index:1}
.stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;transition:transform .4s var(--spring),border-color .3s}
.stat:hover{transform:translateY(-4px);border-color:var(--line2)}
.num{font-size:30px;font-weight:600;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.slbl{font-size:12.5px;color:var(--tx2);margin-top:2px}
.slbl i{font-size:14px;vertical-align:-2px;margin-right:5px;color:var(--tx3)}
.seclbl{display:flex;align-items:baseline;gap:12px;padding:38px 24px 14px;position:relative;z-index:1}
.fig{font-family:'JetBrains Mono',monospace;font-size:11.5px;letter-spacing:.12em;color:var(--accent-soft)}
.sect{font-size:18px;font-weight:600;letter-spacing:-.02em;margin:0}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;padding:0 24px;position:relative;z-index:1}
.pc{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .45s var(--spring),border-color .3s}
.pc:hover{transform:translateY(-6px);border-color:var(--line2)}
.cov{height:78px;display:flex;align-items:flex-start;justify-content:space-between;padding:11px 12px}
.ptype{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;color:rgba(255,255,255,.9);text-shadow:0 1px 2px rgba(0,0,0,.55)}
.hp{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 8px;border-radius:999px;background:rgba(0,0,0,.45);color:#fff;display:inline-flex;align-items:center;gap:5px}
.d{width:7px;height:7px;border-radius:50%}
.pb{padding:14px 15px 16px}
.pn{font-size:15px;font-weight:600;letter-spacing:-.01em}
.pcl{font-size:12px;color:var(--tx2);margin-top:2px}
.pr{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.sp{font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 9px;border-radius:999px;border:1px solid var(--line2);color:var(--tx2)}
.pct{font-size:11.5px;color:var(--tx3)}
.bar{height:5px;border-radius:999px;background:rgba(255,255,255,.08);margin-top:11px;overflow:hidden}
.bar i{display:block;height:100%;border-radius:999px;background:var(--grad-soft)}
.pl{display:flex;gap:9px;margin-top:13px;color:var(--tx3);font-size:16px;align-items:center}
.pc:hover .pl i{color:var(--tx2)}
.pl .due{margin-left:auto;font-size:11.5px;color:var(--tx3);display:inline-flex;align-items:center;gap:5px}
.hub{margin:0 24px;background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;position:relative;z-index:1}
.ht{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:18px 20px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.ht .pn{font-size:17px}
.pills{display:flex;gap:8px;flex-wrap:wrap}
.pill{font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 10px;border-radius:999px;display:inline-flex;align-items:center;gap:6px}
.pill.stage{background:rgba(109,94,252,.16);color:#c4b9ff;border:1px solid rgba(109,94,252,.4)}
.pill.warn{background:rgba(251,191,36,.12);color:#fcd34d;border:1px solid rgba(251,191,36,.3)}
.lbar{display:flex;flex-wrap:wrap;gap:8px;padding:16px 20px;border-bottom:1px solid var(--line)}
.chip{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--tx2);background:var(--card2);border:1px solid var(--line);padding:8px 12px;border-radius:10px;cursor:pointer;transition:.25s}
.chip:hover{color:var(--tx);border-color:var(--line2);transform:translateY(-2px)}
.chip i{font-size:15px}
.chip.go{color:#0b0b0d;background:var(--lime);border-color:transparent}
.steps{display:flex;flex-wrap:wrap;gap:7px;padding:18px 20px;border-bottom:1px solid var(--line)}
.st{flex:1;min-width:70px;display:flex;flex-direction:column;gap:7px}
.tk{height:4px;border-radius:999px;background:rgba(255,255,255,.08)}
.st.done .tk{background:var(--grad-soft)}
.st.cur .tk{background:var(--lime)}
.sl{font-family:'JetBrains Mono',monospace;font-size:10.5px;color:var(--tx3)}
.st.done .sl{color:var(--tx2)}.st.cur .sl{color:var(--tx)}
.tabs{display:flex;gap:3px;padding:14px 20px 0;flex-wrap:wrap}
.tab{font-size:12.5px;color:var(--tx2);padding:8px 13px;border-radius:9px 9px 0 0;background:transparent;border:none;cursor:pointer;font-family:inherit}
.tab:hover{color:var(--tx)}
.tab.on{color:var(--tx)}
.rows{padding:6px 20px 20px}
.hr{display:flex;align-items:center;gap:12px;padding:14px 2px;border-bottom:1px solid var(--line)}
.hr:last-child{border-bottom:none}
.hi{width:36px;height:36px;border-radius:10px;background:var(--card2);border:1px solid var(--line);display:grid;place-items:center;color:var(--tx2);font-size:17px;flex-shrink:0}
.htt{font-size:13.5px;font-weight:500}
.hss{font-size:12px;color:var(--tx3);margin-top:1px}
.tag{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 9px;border-radius:999px;border:1px solid var(--line);color:var(--tx2);white-space:nowrap}
.tag.ok{color:#6ee7b7;border-color:rgba(52,211,153,.3)}
.foot{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tx3);text-align:center;padding:28px 18px 18px;letter-spacing:.14em;position:relative;z-index:1}
.r{opacity:1;transform:none}
html.jsd .r{opacity:0;transform:translateY(22px);transition:opacity .7s ease,transform .7s var(--spring)}
html.jsd .r.in{opacity:1;transform:none}
@media(max-width:640px){
  .nav{padding:12px 16px}.hero{padding:40px 16px 8px}.stats{padding:26px 16px 6px}
  .seclbl{padding:30px 16px 12px}.grid{padding:0 16px}.hub{margin:0 16px}
  .st{min-width:56px}
}
/* ===== iOS 26 Liquid Glass pass ===== */
.nav{background:rgba(10,10,13,.5);backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%)}
.stat,.pc,.hub{background:rgba(255,255,255,.055)!important;backdrop-filter:blur(18px) saturate(150%);-webkit-backdrop-filter:blur(18px) saturate(150%);border-color:rgba(255,255,255,.12)!important;box-shadow:0 10px 30px -12px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.22);position:relative;transition:transform .5s cubic-bezier(.34,1.56,.64,1),background .35s ease,box-shadow .4s ease,border-color .3s ease}
.stat:hover,.pc:hover{background:rgba(255,255,255,.1)!important;box-shadow:0 20px 44px -14px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.28);transform:translateY(-5px) scale(1.012);border-color:rgba(255,255,255,.2)!important}
.stat::after,.pc::after,.hub::after{content:"";position:absolute;inset:0;border-radius:inherit;background:radial-gradient(130% 90% at 22% 0%,rgba(255,255,255,.1),transparent 52%);pointer-events:none;z-index:0}
.stat>*,.hub>*{position:relative;z-index:1}
.pc .cov,.pc .pb{position:relative;z-index:1}
.chip,.ib{background:rgba(255,255,255,.055)!important;backdrop-filter:blur(12px) saturate(150%);-webkit-backdrop-filter:blur(12px) saturate(150%);border-color:rgba(255,255,255,.14)!important;transition:transform .45s cubic-bezier(.34,1.56,.64,1),background .3s ease,color .25s ease,border-color .3s ease}
.chip:hover,.ib:hover{background:rgba(255,255,255,.12)!important;transform:translateY(-2px);border-color:rgba(255,255,255,.22)!important}
.cta{transition:transform .45s cubic-bezier(.34,1.56,.64,1),filter .25s ease}
.cta:active{transform:scale(.95)}
.pill{backdrop-filter:blur(10px) saturate(140%);-webkit-backdrop-filter:blur(10px) saturate(140%)}

/* ============ LIQUID GLASS INTERACTION SUITE ============ */
.ah .stat,.ah .pc,.ah .chip,.ah .ib,.ah .cta,.ah .tab,.ah .pill{-webkit-tap-highlight-color:transparent;overflow:hidden}
.ah .is-pressed{transform:scale(.965)!important;transition:transform .12s ease-out!important}
.ah .pc.is-pressed,.ah .stat.is-pressed{transform:translateY(-4px) scale(.975)!important}
.ah .lg-ripple{position:absolute;z-index:2;pointer-events:none;border-radius:50%;width:18px;height:18px;margin:-9px 0 0 -9px;background:radial-gradient(circle,rgba(255,255,255,.28) 0%,rgba(255,255,255,.12) 45%,transparent 72%);transform:scale(0);opacity:.9;will-change:transform,opacity}
.ah .lg-ripple.run{animation:lgRipple .62s cubic-bezier(.22,.61,.36,1) forwards}
@keyframes lgRipple{0%{transform:scale(0);opacity:.9}60%{opacity:.5}100%{transform:scale(var(--rs,26));opacity:0}}
.ah .cta .lg-ripple{background:radial-gradient(circle,rgba(0,0,0,.22) 0%,rgba(0,0,0,.08) 45%,transparent 72%)}
.tilt-host{--rx:0deg;--ry:0deg;--mx:50%;--my:50%;--glow:0;perspective:900px;perspective-origin:center}
.tilt-inner{position:relative;transform:rotateX(var(--rx)) rotateY(var(--ry));transform-style:preserve-3d;transition:transform .6s var(--spring)}
.tilt-host.tilting .tilt-inner{transition:none;will-change:transform}
.tilt-inner::before{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;z-index:2;background:radial-gradient(180px circle at var(--mx) var(--my),rgba(255,255,255,.16),transparent 60%);opacity:var(--glow);transition:opacity .4s ease;mix-blend-mode:screen}
.hub{--mx:50%;--my:50%;--glow:0}
.hub::before{content:"";position:absolute;inset:0;border-radius:inherit;pointer-events:none;z-index:0;background:radial-gradient(300px circle at var(--mx) var(--my),rgba(167,139,250,.12),transparent 62%);opacity:var(--glow);transition:opacity .35s ease}
.tipwrap{position:relative}
.gtip{position:absolute;top:calc(100% + 9px);left:50%;z-index:40;padding:5px 9px;border-radius:8px;font-size:11.5px;font-weight:500;line-height:1;white-space:nowrap;color:var(--tx);background:rgba(255,255,255,.08);backdrop-filter:blur(14px) saturate(160%);-webkit-backdrop-filter:blur(14px) saturate(160%);border:1px solid rgba(255,255,255,.16);box-shadow:inset 0 1px 0 rgba(255,255,255,.25),0 8px 22px -10px rgba(0,0,0,.7);pointer-events:none;opacity:0;transform:translate(-50%,-4px) scale(.94);transform-origin:top center;transition:opacity .18s ease,transform .34s var(--spring)}
.gtip::before{content:"";position:absolute;bottom:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-bottom-color:rgba(255,255,255,.16)}
.tipwrap:hover>.gtip,.tipwrap:focus-visible>.gtip{opacity:1;transform:translate(-50%,0) scale(1)}
.gtip.tip-r{left:auto;right:0;transform:translate(0,-4px) scale(.94)}
.gtip.tip-r::before{left:auto;right:14px}
.tipwrap:hover>.gtip.tip-r,.tipwrap:focus-visible>.gtip.tip-r{transform:translate(0,0) scale(1)}
.toast-wrap{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;width:max-content;max-width:min(92vw,420px)}
.toast{pointer-events:auto;display:flex;align-items:center;gap:10px;min-height:38px;padding:0 16px;border-radius:999px;color:var(--tx);font-size:13.5px;font-weight:500;line-height:1.3;background:rgba(8,8,11,.66);backdrop-filter:blur(22px) saturate(170%);-webkit-backdrop-filter:blur(22px) saturate(170%);border:1px solid rgba(255,255,255,.14);box-shadow:0 16px 38px -12px rgba(0,0,0,.72),inset 0 1px 0 rgba(255,255,255,.22);transform-origin:top center;transform:translateY(-6px) scale(.7);opacity:0;transition:transform .5s var(--spring),opacity .28s ease;will-change:transform,opacity;white-space:nowrap}
.toast.in{transform:translateY(0) scale(1);opacity:1}
.toast.out{transform:translateY(-6px) scale(.7);opacity:0}
.toast .toast-ic{display:grid;place-items:center;flex:none}
.toast .toast-ic i{font-size:17px;line-height:1}
.toast.ok .toast-ic{color:#6ee7b7}.toast.warn .toast-ic{color:var(--amber)}.toast.error .toast-ic{color:var(--pink)}.toast.info .toast-ic{color:var(--accent-soft)}

<style>
/* ===== project.html — per-project hub (Atelier/glass system reused) ===== */
body{margin:0;background:#08080b}
.ah [hidden]{display:none!important}
.ah{--proj:var(--grad);--proj-c1:rgba(109,94,252,.5)}
/* keep the Live chip lime (glass .chip{background !important} would otherwise hide it) */
.ah .linkbar .chip.go,.ah .linkbar .chip.go:hover{background:var(--lime)!important;color:#0b0b0d!important;border-color:transparent!important}
.ah .nav{position:sticky;top:0;z-index:30;background:rgba(8,8,11,.72);backdrop-filter:blur(20px) saturate(160%);-webkit-backdrop-filter:blur(20px) saturate(160%)}
.ah .wrap{max-width:880px;margin:0 auto;padding:0 24px 8px}

/* back pill */
.ah .back{display:inline-flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.04em;color:var(--tx2);text-decoration:none;padding:8px 12px;border-radius:10px;border:1px solid var(--line);background:rgba(255,255,255,.04);transition:color .25s,border-color .25s,transform .35s var(--spring)}
.ah .back:hover{color:var(--tx);border-color:var(--line2);transform:translateY(-1px)}
.ah .back i{font-size:15px}

/* scroll-revealed identity strip */
.ah .ident-strip{display:flex;align-items:center;gap:9px;opacity:0;transform:translateY(-4px);transition:opacity .3s ease,transform .4s var(--spring);pointer-events:none}
.ah .ident-strip.show{opacity:1;transform:none}
.ah .ident-strip .inm{font-size:14px;font-weight:600;letter-spacing:-.01em;color:var(--tx);max-width:34vw;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ah .ident-strip .pill{padding:3px 9px;font-size:10px}

/* monogram avatar */
.ah .mono-av{flex:none;width:56px;height:56px;border-radius:16px;display:grid;place-items:center;font:600 20px 'Inter',sans-serif;letter-spacing:-.01em;color:#fff;background:var(--proj);box-shadow:inset 0 1px 0 rgba(255,255,255,.35),0 10px 24px -10px var(--proj-c1);overflow:hidden;text-shadow:0 1px 3px rgba(0,0,0,.45)}
.ah .mono-av.sm{width:22px;height:22px;border-radius:7px;font-size:11px;box-shadow:none;text-shadow:none}

/* identity console panel (glass) */
.ah .console{position:relative;margin-top:24px;border-radius:18px;overflow:hidden;padding:22px;background:rgba(255,255,255,.055);backdrop-filter:blur(18px) saturate(150%);-webkit-backdrop-filter:blur(18px) saturate(150%);border:1px solid rgba(255,255,255,.12);box-shadow:0 10px 30px -12px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.22)}
.ah .console>*{position:relative;z-index:1}
.ah .console::before{content:"";position:absolute;inset:0;z-index:0;background:var(--proj);opacity:.12;pointer-events:none;-webkit-mask-image:radial-gradient(120% 90% at 14% -10%,#000,transparent 60%);mask-image:radial-gradient(120% 90% at 14% -10%,#000,transparent 60%)}
.ah .console::after{content:"";position:absolute;left:0;right:0;top:0;height:3px;z-index:2;background:var(--proj)}
.ah .idrow{display:flex;align-items:center;gap:16px}
.ah .idtext{flex:1;min-width:0}
.ah .idtext h1{margin:0;font-size:clamp(21px,3vw,26px);font-weight:600;letter-spacing:-.02em;color:var(--tx);line-height:1.15}
.ah .idsub{margin-top:4px;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.04em;color:var(--tx3)}

/* progress ring */
.ah .pring{flex:none;position:relative;display:grid;place-items:center;width:72px;height:72px}
.ah .pring svg{transform:rotate(-90deg)}
.ah .pring .trk{fill:none;stroke:var(--line2);stroke-width:6}
.ah .pring .arc{fill:none;stroke:var(--accent-soft);stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset 1s var(--spring)}
.ah .pring-lbl{position:absolute;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--tx2);font-variant-numeric:tabular-nums}
.ah .pring-lbl b{color:var(--tx);font-weight:600}

/* pills line + health variants + pct tag */
.ah .console .pills{margin-top:16px}
.ah .pill.health--on_track{background:rgba(52,211,153,.12);color:#6ee7b7;border:1px solid rgba(52,211,153,.32)}
.ah .pill.health--at_risk{background:rgba(251,191,36,.12);color:#fcd34d;border:1px solid rgba(251,191,36,.3)}
.ah .pill.health--blocked{background:rgba(248,113,113,.12);color:#fca5a5;border:1px solid rgba(248,113,113,.34)}
.ah .pct-tag{font-family:'JetBrains Mono',monospace;font-size:11px;padding:5px 10px;border-radius:999px;border:1px solid var(--line2);color:var(--tx2)}
.ah .summary{margin:14px 0 0;font-size:13.5px;line-height:1.55;color:var(--tx2);max-width:70ch}

/* link bar */
.ah .linkbar{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px}
.ah .linkbar .chip{text-decoration:none}
.ah .nolinks{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;color:var(--tx3);margin-top:18px}

/* centered section eyebrow with tick motif */
.ah .sec{margin-top:34px}
.ah .seclbl2{display:flex;align-items:center;justify-content:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--accent-soft);margin-bottom:16px}
.ah .seclbl2::before,.ah .seclbl2::after{content:"";width:22px;height:2px;border-radius:2px;background:var(--grad-soft);opacity:.7}

/* lifecycle rail — reuse .steps/.st/.tk/.sl; reset panel chrome for standalone use */
.ah #lifecycle .steps{padding:0;border-bottom:none}
.ah .railcap{text-align:center;font-family:'JetBrains Mono',monospace;font-size:11.5px;letter-spacing:.04em;color:var(--tx2);margin-top:14px}
.ah .st.blocked .tk{background:#f87171}
.ah .st.blocked .sl{color:#fca5a5}
.ah .flow-vert{display:none}

/* meta grid */
.ah .metagrid{display:grid;grid-template-columns:repeat(2,minmax(280px,1fr));gap:16px}
.ah .metagrid.solo{grid-template-columns:minmax(0,560px);justify-content:center}
.ah .mcard{position:relative;border-radius:16px;overflow:hidden;padding:18px;background:rgba(255,255,255,.055);backdrop-filter:blur(18px) saturate(150%);-webkit-backdrop-filter:blur(18px) saturate(150%);border:1px solid rgba(255,255,255,.12);box-shadow:0 10px 30px -12px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.22)}
.ah .mhead{display:flex;align-items:center;gap:11px;margin-bottom:6px}
.ah .mhead .ht2{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.16em;text-transform:uppercase;color:var(--tx2)}

/* definition rows */
.ah .mrow{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;padding:11px 0;border-bottom:1px solid var(--line)}
.ah .mrow:last-child{border-bottom:none}
.ah .mlbl{font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);flex:none;padding-top:1px}
.ah .mval{font-size:13px;color:var(--tx);text-align:right;line-height:1.45;min-width:0;font-variant-numeric:tabular-nums}
.ah .mval a{color:var(--accent-soft);text-decoration:none;word-break:break-all}

.ah .commitmsg{display:block;color:var(--tx2);font-size:12.5px;margin-top:2px;max-width:34ch;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ah .langdot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
.ah .tag.err{color:#fca5a5;border-color:rgba(248,113,113,.34)}
.ah .tag.warn{color:#fcd34d;border-color:rgba(251,191,36,.3)}

/* footer bottom back link */
.ah .footlink{display:block;text-align:center;margin-top:8px;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--accent-soft);text-decoration:none}

/* states */
.ah .skel-wrap{margin-top:24px}
.ah .skel{border-radius:16px;background:linear-gradient(100deg,rgba(255,255,255,.04) 30%,rgba(255,255,255,.09) 50%,rgba(255,255,255,.04) 70%);background-size:200% 100%;animation:ah-shimmer 1.4s linear infinite}
@keyframes ah-shimmer{to{background-position:-200% 0}}
.ah .empty{max-width:460px;margin:80px auto;text-align:center;padding:36px 24px;border-radius:18px;background:rgba(255,255,255,.04);border:1px solid var(--line)}
.ah .empty i{font-size:40px;color:var(--tx3)}
.ah .empty h2{margin:14px 0 6px;font-size:18px;font-weight:600;color:var(--tx)}
.ah .empty p{font-size:13px;color:var(--tx2);margin:0 0 18px}

/* responsive */
@media(max-width:720px){
  .ah .metagrid,.ah .metagrid.solo{grid-template-columns:1fr}
  .ah .steps{display:none}
  .ah .flow-vert{display:block;position:relative;padding-left:26px;max-width:420px;margin:0 auto}
  .ah .flow-vert::before{content:"";position:absolute;left:8px;top:6px;bottom:6px;width:2px;background:var(--line);border-radius:2px}
  .ah .flow-vert .vfill{position:absolute;left:8px;top:6px;width:2px;border-radius:2px;background:var(--grad-soft);height:var(--flow-h,0%)}

  .ah .vnode .vdot{position:absolute;left:-22px;width:12px;height:12px;border-radius:50%;border:2px solid var(--line);background:var(--bg);box-sizing:border-box}
  .ah .vnode.done .vdot{background:var(--grad-soft);border-color:transparent}

}
@media(prefers-reduced-motion:reduce){

}
</style>

    </div>
  </main>

  <footer class="foot" id="foot" hidden><span id="syncline">ARTIST HUB</span><a class="footlink" href="/dashboard.html#projects">Back to dashboard</a></footer>
</div>

<script>
(function(){
  var STAGE={lead:'Lead',planning:'Planning',proposal:'Proposal',design:'Design',development:'Development',qa:'QA / staging',launch:'Launch',maintenance:'Maintenance'};
  var SHORT={lead:'Lead',planning:'Planning',proposal:'Proposal',design:'Design',development:'Dev',qa:'QA',launch:'Launch',maintenance:'Maint.'};
  var ORDER=['lead','planning','proposal','design','development','qa','launch','maintenance'];
  var ICON={lead:'ti-flag',planning:'ti-clipboard-list',proposal:'ti-file-description',design:'ti-palette',development:'ti-code',qa:'ti-flask',launch:'ti-rocket',maintenance:'ti-tool'};
  var HEALTH={on_track:['#34d399','On track'],at_risk:['#fbbf24','At risk'],blocked:['#f87171','Blocked']};
  var LINKS=[['figma','ti-brand-figma','Figma'],['repo','ti-brand-github','Repository'],['dev','ti-code','Dev'],['staging','ti-flask','Staging'],['live','ti-world','Live'],['docs','ti-file-text','Docs']];
  var LANG={TypeScript:'#3178c6',JavaScript:'#f1e05a',Python:'#3572A5',CSS:'#563d7c',HTML:'#e34c26',Svelte:'#ff3e00',Vue:'#41b883'};
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  function initials(n){var w=String(n||'?').split(/[\s–—-]+/).filter(Boolean);return ((w[0]?w[0][0]:'?')+(w[1]?w[1][0]:'')).toUpperCase();}
  function present(v){return v!=null&&v!=='';}
  function host(u){try{return new URL(u).host;}catch(e){return u;}}
  function absDate(d){return d.toLocaleDateString('en',{month:'short',day:'numeric',year:'numeric'});}
  function relTime(iso){if(!iso)return '';var d=new Date(iso);if(isNaN(d))return '';var days=Math.round((Date.now()-d.getTime())/864e5);if(days<0)return absDate(d);if(days<1)return 'today';if(days<2)return 'yesterday';if(days<30)return days+' days ago';return absDate(d);}
  function fmtSync(iso){try{var d=new Date(iso);if(isNaN(d))return '';return d.toLocaleDateString('en',{day:'numeric',month:'short',year:'numeric'}).toUpperCase();}catch(e){return '';}}
  function rgba(hex,a){var m=/([0-9a-f]{6})/i.exec(hex||'');if(!m)return 'rgba(109,94,252,'+a+')';var n=parseInt(m[1],16);return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')';}
  function $(id){return document.getElementById(id);}
  function mrow(lbl,val){return '<div class="mrow"><span class="mlbl">'+esc(lbl)+'</span><span class="mval">'+val+'</span></div>';}

  var slug=new URLSearchParams(location.search).get('slug');
  if(!slug){showNF('No project specified.');return;}
  fetch('/data/projects.json',{cache:'no-store'}).then(function(r){return r.json();}).then(function(data){
    var p=(data.projects||[]).find(function(x){return x.slug===slug&&!x.hidden;});
    if(!p){showNF("We couldn't find a project for this link.");return;}
    render(p,data.generatedAt);
  }).catch(showErr);

  function render(p,gen){
    var ah=$('ah');
    var grad=p.coverGradient||'var(--grad)';
    ah.style.setProperty('--proj',grad);
    ah.style.setProperty('--proj-c1',rgba(grad,.5));
    document.title=p.name+' · Artist Hub';

    var init=initials(p.name);
    $('mono').textContent=init; $('stripMono').textContent=init;
    $('pname').textContent=p.name; $('stripName').textContent=p.name;
    $('psub').textContent=p.client+(p.type?' · '+p.type:'');

    if(p.progress==null){$('pring').style.display='none';}
    else{var C=2*Math.PI*30;var arc=$('ringArc');arc.style.strokeDasharray=C;arc.style.strokeDashoffset=C*(1-p.progress/100);$('ringLbl').innerHTML='<b>'+p.progress+'</b>%';$('pring').setAttribute('aria-label',p.progress+' percent complete');}

    var h=HEALTH[p.health]||HEALTH.on_track;
    var pills='<span class="pill stage"><i class="ti '+(ICON[p.stage]||'ti-flag')+'" aria-hidden="true"></i>'+esc(STAGE[p.stage]||p.stage)+'</span>';
    pills+='<span class="pill health--'+esc(p.health||'on_track')+'"><span style="width:7px;height:7px;border-radius:50%;display:inline-block;background:'+h[0]+'"></span>'+h[1]+'</span>';
    if(p.progress!=null)pills+='<span class="pct-tag">'+p.progress+'%</span>';
    $('pills').innerHTML=pills;
    $('stripStage').innerHTML='<i class="ti '+(ICON[p.stage]||'ti-flag')+'" aria-hidden="true"></i>'+esc(STAGE[p.stage]||p.stage);

    if(present(p.summary))$('psum').textContent=p.summary; else $('psum').remove();

    var liveUrl=(p.links&&p.links.live)||(p.deploy&&p.deploy.url)||'';
    var lb='';
    LINKS.forEach(function(l){
      var url=l[0]==='live'?liveUrl:(p.links&&p.links[l[0]]);
      if(!present(url))return;
      lb+='<a class="chip'+(l[0]==='live'?' go':'')+'" href="'+esc(url)+'" target="_blank" rel="noopener"><i class="ti '+l[1]+'" aria-hidden="true"></i>'+l[2]+'</a>';
    });
    $('linkbar').innerHTML=lb||'<div class="nolinks">No external links yet</div>';

    var cur=ORDER.indexOf(p.stage); if(cur<0)cur=0;
    var blocked=p.health==='blocked';
    var rail='',vert='';
    ORDER.forEach(function(s,i){
      var c=i<cur?'done':(i===cur?'cur':'');
      if(i===cur&&blocked)c+=' blocked';
      rail+='<div class="st '+c+'"><div class="tk"></div><div class="sl">'+esc(SHORT[s])+'</div></div>';
      vert+='<div class="vnode '+c+'"><span class="vdot"></span><span class="vsl">'+esc(STAGE[s])+'</span></div>';
    });
    $('rail').innerHTML=rail;
    var rv=$('railVert'); rv.style.setProperty('--flow-h',(cur/7*100)+'%'); rv.innerHTML='<span class="vfill"></span>'+vert;
    $('railcap').textContent='Currently in '+(STAGE[p.stage]||p.stage)+(p.progress!=null?' · '+p.progress+'% complete':'')+(blocked?' · blocked':'');

    var d=p.deploy||{}; var st=d.state||'';
    var dt=$('deployState'); dt.textContent=st||'—'; dt.className='tag'+(st==='READY'?' ok':st==='ERROR'?' err':st?' warn':'');
    var db='';
    if(present(d.provider))db+=mrow('Provider','<i class="ti ti-brand-vercel" aria-hidden="true" style="vertical-align:-2px;margin-right:5px"></i>'+esc(d.provider));
    if(present(st))db+=mrow('Status','<span style="color:'+(st==='READY'?'#6ee7b7':st==='ERROR'?'#fca5a5':'#fcd34d')+'">'+esc(st)+'</span>');
    if(present(d.url))db+=mrow('Live URL','<a href="'+esc(d.url)+'" target="_blank" rel="noopener">'+esc(host(d.url))+'</a>');
    if(present(d.lastDeployed))db+=mrow('Last deployed','<span title="'+esc(d.lastDeployed)+'">'+esc(relTime(d.lastDeployed))+'</span>');
    $('deployBody').innerHTML=db||mrow('Status','<span class="muted">No deploy data</span>');

    var r=p.repoInfo||{};
    if(!present(r.fullName)){var rc=$('repoCard'); if(rc)rc.remove(); $('metagrid').classList.add('solo');}
    else{
      $('repoVis').textContent=r.private?'Private':'Public';
      var rb='';
      rb+=mrow('Repository',(present(p.links&&p.links.repo)?'<a href="'+esc(p.links.repo)+'" target="_blank" rel="noopener">'+esc(r.fullName)+'</a>':esc(r.fullName)));
      if(present(r.language))rb+=mrow('Language','<span class="langdot" style="background:'+(LANG[r.language]||'var(--accent-soft)')+'"></span>'+esc(r.language));
      rb+=mrow('Open PRs',(r.openPRs>0?String(r.openPRs):'<span class="muted">None</span>'));
      if(present(r.lastCommitMsg))rb+=mrow('Last commit','<span title="'+esc(r.lastCommitDate)+'">'+esc(relTime(r.lastCommitDate))+'</span><span class="commitmsg" title="'+esc(r.lastCommitMsg)+'">'+esc(r.lastCommitMsg)+'</span>');
      $('repoBody').innerHTML=rb;
    }

    $('skel').style.display='none';
    $('content').hidden=false;
    var f=$('foot'); f.hidden=false; $('syncline').textContent='ARTIST HUB · SYNCED '+(fmtSync(gen)||'');

    var strip=$('identStrip');
    var rm=window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches;
    if(rm||!('IntersectionObserver' in window)){strip.classList.add('show');}
    else{var hdr=document.querySelector('.console');if(hdr){new IntersectionObserver(function(e){strip.classList.toggle('show',!e[0].isIntersecting);},{rootMargin:'-64px 0px 0px 0px'}).observe(hdr);}else strip.classList.add('show');}
  }

  function hideAll(){$('skel').style.display='none';$('content').hidden=true;$('foot').hidden=true;}
  function showNF(msg){hideAll();$('nfMsg').textContent=msg;$('notfound').hidden=false;document.title='Project not found · Artist Hub';}
  function showErr(){hideAll();$('nfTitle').textContent='Could not load';$('nfMsg').textContent='Something went wrong loading this project. Check your connection and retry.';var rb=$('retryBtn');rb.hidden=false;rb.onclick=function(){location.reload();};$('notfound').hidden=false;document.title='Error · Artist Hub';}
})();
</script>
</body>
</html>
