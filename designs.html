<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Card designs — real data</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
<style>
body{margin:0;background:#08080b;color:#f4f4f6;font-family:'Inter',system-ui,sans-serif;padding:34px 26px 80px}
h1.tt{font-size:20px;margin:0 0 6px}.subt{color:#a3a3ae;font-size:13px;margin:0 0 34px}
#root{display:flex;flex-direction:column;gap:48px}
.cmp .hd{display:flex;align-items:baseline;gap:11px}
.cmp .hd b{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.18em;color:#a78bfa}
.cmp .hd h2{font-size:17px;font-weight:600;margin:0}
.deck{display:flex;flex-wrap:wrap;gap:18px;align-items:flex-start;margin-top:14px}
/* Cover banner */
.d1 {
  --bg: #08080b;
  --tx: #f4f4f6;
  --tx2: #a3a3ae;
  --tx3: #8a8a96;
  --accent: #6d5efc;
  --accent-soft: #a78bfa;
  --lime: #d6ff4f;
  width: 260px;
  font-family: 'Inter', system-ui, sans-serif;
  color: var(--tx);
}

.d1 * { box-sizing: border-box; }

.d1 .card {
  position: relative;
  border-radius: 18px;
  overflow: hidden;
  background: rgba(255, 255, 255, .055);
  backdrop-filter: blur(18px) saturate(150%);
  -webkit-backdrop-filter: blur(18px) saturate(150%);
  border: 1px solid rgba(255, 255, 255, .12);
  box-shadow: 0 10px 30px -12px rgba(0, 0, 0, .6);
  transition: transform .25s ease, box-shadow .25s ease;
}

.d1 .card:hover {
  transform: translateY(-3px);
  box-shadow: 0 18px 40px -14px rgba(0, 0, 0, .7);
}

/* ---- Cover band ---- */
.d1 .cover {
  position: relative;
  height: 96px;
  padding: 14px;
  background: linear-gradient(135deg, #6d5efc, #22d3ee);
  display: flex;
  align-items: flex-start;
  gap: 11px;
}

.d1 .cover::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(8, 8, 11, 0) 35%, rgba(8, 8, 11, .55) 100%);
  pointer-events: none;
}

.d1 .mono {
  position: relative;
  z-index: 1;
  width: 40px;
  height: 40px;
  flex: none;
  border-radius: 11px;
  display: grid;
  place-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 15px;
  letter-spacing: .5px;
  color: var(--tx);
  background: rgba(8, 8, 11, .38);
  border: 1px solid rgba(255, 255, 255, .28);
  backdrop-filter: blur(4px);
}

.d1 .title-wrap {
  position: relative;
  z-index: 1;
  align-self: flex-end;
  min-width: 0;
}

.d1 .name {
  font-size: 16px;
  font-weight: 650;
  line-height: 1.15;
  letter-spacing: -.2px;
  color: #fff;
  text-shadow: 0 1px 6px rgba(8, 8, 11, .55);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ---- Body ---- */
.d1 .body {
  padding: 13px 14px 14px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.d1 .meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: .2px;
  color: var(--tx2);
  margin-top: -1px;
}

/* ---- Link row ---- */
.d1 .links {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}

.d1 .link {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 8px 2px 7px;
  border-radius: 10px;
  background: rgba(255, 255, 255, .05);
  border: 1px solid rgba(255, 255, 255, .1);
  color: var(--tx2);
  text-decoration: none;
  font-family: 'JetBrains Mono', monospace;
  font-size: 8.5px;
  letter-spacing: .4px;
  text-transform: uppercase;
  transition: background .18s ease, color .18s ease, border-color .18s ease;
}

.d1 .link i { font-size: 15px; line-height: 1; }

.d1 .link:hover {
  background: rgba(109, 94, 252, .16);
  border-color: rgba(167, 139, 250, .45);
  color: var(--tx);
}

/* Live is the single primary action -> lime */
.d1 .link.live:hover {
  background: rgba(214, 255, 79, .14);
  border-color: rgba(214, 255, 79, .5);
  color: var(--lime);
}

/* ---- Status row ---- */
.d1 .status {
  display: flex;
  align-items: center;
  gap: 8px;
}

.d1 .health {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 4px 9px;
  border-radius: 999px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .2px;
}

.d1 .health .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
}

.d1 .stage {
  margin-left: auto;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--tx2);
}

.d1 .stage i { font-size: 13px; color: var(--accent-soft); }

/* ---- Progress ---- */
.d1 .progress {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.d1 .progress-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: .3px;
  color: var(--tx3);
  text-transform: uppercase;
}

.d1 .progress-head b {
  color: var(--tx);
  font-size: 12px;
  font-weight: 600;
}

.d1 .bar {
  height: 5px;
  border-radius: 999px;
  background: rgba(255, 255, 255, .08);
  overflow: hidden;
}

.d1 .bar span {
  display: block;
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, var(--accent), var(--accent-soft));
}

/* ---- Footer ---- */
.d1 .foot {
  display: flex;
  align-items: center;
  gap: 6px;
  padding-top: 11px;
  border-top: 1px solid rgba(255, 255, 255, .08);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--tx3);
}

.d1 .foot i { font-size: 12px; }

.d1 .foot .ml {
  margin-left: auto;
  color: var(--tx2);
}
/* Progress ring focal */
.d2{
  --bg:#08080b;--tx:#f4f4f6;--tx2:#a3a3ae;--tx3:#8a8a96;
  --accent:#6d5efc;--accent-soft:#a78bfa;--lime:#d6ff4f;
  font-family:'Inter',system-ui,sans-serif;
  width:250px;box-sizing:border-box;
  background:rgba(255,255,255,.055);
  backdrop-filter:blur(18px) saturate(150%);
  -webkit-backdrop-filter:blur(18px) saturate(150%);
  border:1px solid rgba(255,255,255,.12);
  border-radius:20px;
  box-shadow:0 10px 30px -12px rgba(0,0,0,.6);
  padding:20px 18px 16px;
  color:var(--tx);
}
.d2 *{box-sizing:border-box;}

/* ── ring focal ── */
.d2-ringwrap{position:relative;width:148px;height:148px;margin:2px auto 16px;}
.d2-ring{width:148px;height:148px;transform:rotate(-90deg);display:block;}
.d2-ring-track{fill:none;stroke:rgba(255,255,255,.08);stroke-width:9;}
.d2-ring-arc{fill:none;stroke:url(#d2grad);stroke-width:9;stroke-linecap:round;
  stroke-dasharray:402.1;}
.d2-ring-center{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1px;}
.d2-pct{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:38px;
  line-height:1;letter-spacing:-1px;font-variant-numeric:tabular-nums;}
.d2-pct span{font-size:18px;font-weight:600;color:var(--accent-soft);margin-left:1px;}
.d2-pct-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600;
  letter-spacing:1.5px;color:var(--tx3);text-transform:uppercase;margin-top:3px;}

/* ── identity ── */
.d2-id{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.d2-mono{flex:none;width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-weight:700;font-size:14px;color:#fff;
  background:linear-gradient(135deg,#6d5efc,#22d3ee);
  box-shadow:0 4px 12px -4px rgba(109,94,252,.55);}
.d2-id-txt{min-width:0;}
.d2-name{font-size:15px;font-weight:650;line-height:1.2;letter-spacing:-.2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.d2-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--tx2);
  margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* ── chips: health + stage ── */
.d2-chips{display:flex;gap:7px;margin-bottom:14px;}
.d2-chip{flex:1;display:flex;align-items:center;gap:5px;justify-content:center;
  padding:6px 4px;border-radius:9px;font-size:11px;font-weight:600;
  border:1px solid rgba(255,255,255,.07);}
.d2-chip i{font-size:13px;}
.d2-health .d2-dot{width:7px;height:7px;border-radius:50%;}
.d2-stage{color:var(--accent-soft);background:rgba(109,94,252,.13);
  border-color:rgba(167,139,250,.2);}

/* ── links ── */
.d2-links{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px;}
.d2-link{display:flex;align-items:center;gap:7px;padding:9px 10px;border-radius:10px;
  background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.1);
  color:var(--tx);text-decoration:none;font-size:11.5px;font-weight:600;
  transition:background .15s ease,border-color .15s ease,transform .15s ease;}
.d2-link i{font-size:15px;color:var(--tx2);transition:color .15s ease;}
.d2-link:hover{background:rgba(255,255,255,.085);border-color:rgba(255,255,255,.18);
  transform:translateY(-1px);}
.d2-link:hover i{color:var(--accent-soft);}
.d2-link.d2-live{color:var(--lime);border-color:rgba(214,255,79,.28);
  background:rgba(214,255,79,.07);}
.d2-link.d2-live i{color:var(--lime);}
.d2-link.d2-live:hover{background:rgba(214,255,79,.13);border-color:rgba(214,255,79,.45);}

/* ── footer ── */
.d2-foot{display:flex;align-items:center;gap:6px;padding-top:13px;
  border-top:1px solid rgba(255,255,255,.08);
  font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--tx3);}
.d2-foot i{font-size:13px;}
.d2-foot .d2-pr{margin-left:auto;display:flex;align-items:center;gap:4px;color:var(--tx2);}
/* Compact list-row */
.d3{--bg:#08080b;--tx:#f4f4f6;--tx2:#a3a3ae;--tx3:#8a8a96;--accent:#6d5efc;--accent-soft:#a78bfa;--lime:#d6ff4f;font-family:'Inter',system-ui,sans-serif;width:360px;color:var(--tx)}
.d3 *{box-sizing:border-box}
.d3 .row{position:relative;display:flex;align-items:center;gap:13px;padding:14px 16px 22px;border-radius:16px;background:rgba(255,255,255,.055);backdrop-filter:blur(18px) saturate(150%);-webkit-backdrop-filter:blur(18px) saturate(150%);border:1px solid rgba(255,255,255,.12);box-shadow:0 10px 30px -12px rgba(0,0,0,.6);overflow:hidden;transition:border-color .2s ease,transform .2s ease}
.d3 .row:hover{border-color:rgba(255,255,255,.2);transform:translateY(-1px)}
.d3 .mono{position:relative;flex:0 0 auto;width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,#6d5efc,#22d3ee);display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-weight:700;font-size:16px;letter-spacing:.5px;color:#fff;box-shadow:0 4px 14px -4px rgba(109,94,252,.55)}
.d3 .mid{flex:1 1 auto;min-width:0}
.d3 .name{font-size:14.5px;font-weight:650;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.d3 .sub{margin-top:3px;font-size:11px;color:var(--tx2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.d3 .meta{display:flex;align-items:center;gap:8px;margin-top:7px}
.d3 .health{display:inline-flex;align-items:center;gap:5px;padding:2px 8px 2px 6px;border-radius:999px;font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:600;letter-spacing:.4px;text-transform:uppercase}
.d3 .dot{width:6px;height:6px;border-radius:50%}
.d3 .stage{display:inline-flex;align-items:center;gap:4px;font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:500;letter-spacing:.3px;color:var(--tx3);text-transform:uppercase}
.d3 .stage i{font-size:12px;color:var(--accent-soft)}
.d3 .links{flex:0 0 auto;display:grid;grid-template-columns:repeat(2,30px);grid-auto-rows:30px;gap:5px}
.d3 .lnk{display:flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:9px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--tx2);font-size:15px;text-decoration:none;transition:background .15s ease,color .15s ease,border-color .15s ease}
.d3 .lnk:hover{background:rgba(109,94,252,.18);border-color:rgba(167,139,250,.4);color:var(--accent-soft)}
.d3 .lnk.live{background:rgba(214,255,79,.1);border-color:rgba(214,255,79,.32);color:var(--lime)}
.d3 .lnk.live:hover{background:rgba(214,255,79,.2);border-color:rgba(214,255,79,.55);color:var(--lime)}
.d3 .lnk .ti{line-height:1}
.d3 .foot{position:absolute;left:16px;right:16px;bottom:9px;display:flex;align-items:center;gap:10px}
.d3 .bar{position:relative;flex:1 1 auto;height:3px;border-radius:3px;background:rgba(255,255,255,.09);overflow:hidden}
.d3 .bar i{position:absolute;inset:0 auto 0 0;width:62%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent-soft));display:block}
.d3 .pct{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;color:var(--tx);letter-spacing:.3px}
.d3 .upd{font-family:'JetBrains Mono',monospace;font-size:9.5px;color:var(--tx3);white-space:nowrap}
/* Glass spotlight */
.d4{
  --bg:#08080b;--tx:#f4f4f6;--tx2:#a3a3ae;--tx3:#8a8a96;
  --accent:#6d5efc;--accent-soft:#a78bfa;--lime:#d6ff4f;
  font-family:'Inter',sans-serif;
  width:258px;box-sizing:border-box;
}
.d4 *{box-sizing:border-box;margin:0;padding:0;}
.d4 .card{
  position:relative;
  padding:30px 22px 22px;
  border-radius:24px;
  background:rgba(255,255,255,.055);
  backdrop-filter:blur(18px) saturate(150%);
  -webkit-backdrop-filter:blur(18px) saturate(150%);
  border:1px solid rgba(255,255,255,.12);
  box-shadow:0 10px 30px -12px rgba(0,0,0,.6);
  overflow:hidden;
  text-align:center;
  transition:transform .25s ease, box-shadow .25s ease;
}
.d4 .card:hover{
  transform:translateY(-3px);
  box-shadow:0 20px 44px -14px rgba(0,0,0,.7);
}
/* radial brand spotlight behind identity */
.d4 .glow{
  position:absolute;top:-30px;left:50%;
  width:240px;height:240px;
  transform:translateX(-50%);
  background:radial-gradient(circle at 50% 50%,rgba(109,94,252,.55),rgba(34,211,238,.22) 38%,transparent 68%);
  filter:blur(8px);
  pointer-events:none;z-index:0;
}
.d4 .card>*{position:relative;z-index:1;}

/* monogram */
.d4 .mono{
  width:60px;height:60px;margin:0 auto 16px;
  border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;
  font-weight:700;font-size:21px;letter-spacing:.5px;color:#fff;
  background:linear-gradient(135deg,#6d5efc,#22d3ee);
  box-shadow:0 8px 22px -6px rgba(109,94,252,.6),inset 0 1px 0 rgba(255,255,255,.3);
}

.d4 .name{font-size:18px;font-weight:600;color:var(--tx);letter-spacing:-.2px;line-height:1.2;overflow-wrap:anywhere;}
.d4 .meta{
  margin-top:5px;font-family:'JetBrains Mono',monospace;
  font-size:10.5px;color:var(--tx2);letter-spacing:.3px;
}

/* health pill */
.d4 .health{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:14px;padding:5px 12px;border-radius:999px;
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;
  letter-spacing:.5px;text-transform:uppercase;
}
.d4 .health .dot{width:6px;height:6px;border-radius:50%;}

/* stage + progress row */
.d4 .stat{
  display:flex;align-items:center;justify-content:center;gap:18px;
  margin-top:18px;padding-top:16px;
  border-top:1px solid rgba(255,255,255,.08);
}
.d4 .stat .blk{display:flex;flex-direction:column;align-items:center;gap:3px;}
.d4 .stat .lbl{
  font-family:'JetBrains Mono',monospace;font-size:8.5px;
  letter-spacing:.8px;text-transform:uppercase;color:var(--tx3);
}
.d4 .stat .val{
  display:inline-flex;align-items:center;gap:5px;
  font-size:13px;font-weight:600;color:var(--tx);
}
.d4 .stat .val.pct{font-family:'JetBrains Mono',monospace;color:var(--accent-soft);}
.d4 .stat .val i{font-size:14px;color:var(--accent-soft);}
.d4 .stat .sep{width:1px;height:30px;background:rgba(255,255,255,.1);}

/* progress bar */
.d4 .bar{
  height:5px;margin-top:14px;border-radius:999px;
  background:rgba(255,255,255,.08);overflow:hidden;
}
.d4 .bar span{
  display:block;height:100%;border-radius:999px;
  background:linear-gradient(90deg,#6d5efc,#22d3ee);
}

/* links */
.d4 .links{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:18px;}
.d4 .lnk{
  display:flex;align-items:center;justify-content:center;gap:7px;
  padding:11px 0;border-radius:12px;
  font-size:12px;font-weight:600;text-decoration:none;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12);
  color:var(--tx);transition:background .18s ease,border-color .18s ease;
}
.d4 .lnk i{font-size:15px;color:var(--accent-soft);}
.d4 .lnk:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);}
/* Live = single lime primary action */
.d4 .lnk.live{
  background:var(--lime);border-color:var(--lime);color:#1a1c00;
}
.d4 .lnk.live i{color:#1a1c00;}
.d4 .lnk.live:hover{background:#e2ff6e;border-color:#e2ff6e;}

/* footer */
.d4 .foot{
  display:flex;align-items:center;justify-content:center;gap:6px;
  margin-top:16px;
  font-family:'JetBrains Mono',monospace;font-size:9.5px;
  letter-spacing:.3px;color:var(--tx3);
}
.d4 .foot i{font-size:12px;}
/* Lifecycle track */
.d5 *{box-sizing:border-box;margin:0;padding:0}
.d5{
  --bg:#08080b;--tx:#f4f4f6;--tx2:#a3a3ae;--tx3:#8a8a96;
  --accent:#6d5efc;--accent-soft:#a78bfa;--lime:#d6ff4f;
  font-family:'Inter',system-ui,sans-serif;color:var(--tx);
}
.d5 .card{
  position:relative;width:300px;border-radius:18px;overflow:hidden;
  background:rgba(255,255,255,.055);

  -webkit-backdrop-filter:blur(18px) saturate(150%);

  box-shadow:0 10px 30px -12px rgba(0,0,0,.6);
  transition:transform .25s ease,box-shadow .25s ease;
}
.d5 .card:hover{transform:translateY(-3px);box-shadow:0 18px 40px -14px rgba(0,0,0,.7)}
/* identity strip — gradient used tastefully */
.d5 .strip{height:3px;width:100%;background:linear-gradient(135deg,#6d5efc,#22d3ee)}
.d5 .body{padding:16px 16px 14px}

/* header: monogram + identity + health */
.d5 .head{display:flex;align-items:flex-start;gap:11px}
.d5 .mono{
  flex:none;width:42px;height:42px;border-radius:11px;
  display:grid;place-items:center;
  font-family:'JetBrains Mono',monospace;font-weight:700;font-size:15px;
  letter-spacing:.5px;color:#fff;
  background:linear-gradient(135deg,#6d5efc,#22d3ee);
  box-shadow:0 4px 12px -4px rgba(34,211,238,.5);
}
.d5 .id{min-width:0;flex:1;padding-top:1px}
.d5 .name{font-size:15.5px;font-weight:600;line-height:1.2;letter-spacing:-.2px;

  for(var j=0;j<nodes.length;j++){
    var cls = j<nowIdx ? " done" : (j===nowIdx ? " now" : "");
    ticks += '<div class="tick'+cls+'"><i></i><span class="t-lbl">'+esc(nodes[j].lbl)+'</span></div>';
  }
  // fill width: from first node (left:7px) to centered on the current node.
  // ticks are evenly distributed across the rail; node centers sit at j/(n-1) of the inner span.
  var n = nodes.length;
  var fillPct = (n>1) ? (nowIdx/(n-1))*100 : 0;
  if(fillPct<6) fillPct=6;

  // progress %
  var prog = present(p.progress) ? p.progress : Math.round(fillPct);

  // stage caption
  var stageLabel = (AH.STAGE && AH.STAGE[stageKey]) ? AH.STAGE[stageKey] : stageKey;
  var stageIcon = (AH.STAGE_ICON && AH.STAGE_ICON[stageKey]) ? AH.STAGE_ICON[stageKey] : "ti-flag";

  // extra: PRs / language (only if present)
  var extraBits=[];
  var prs = AH.openPRs(p);
  if(present(prs) && prs>0) extraBits.push('<i class="ti ti-git-pull-request"></i>'+prs+' PR'+(prs===1?'':'s'));
  var lang = AH.language(p);
  if(present(lang)) extraBits.push(esc(lang));
  var extraHtml = extraBits.length
    ? '<span class="extra">'+extraBits.join('<span class="sep">·</span> ')+'</span>'
    : '';

  // links (only present)
  var links = AH.links(p) || [];
  var linksHtml = links.map(function(l){
    var live = l.key==="live" ? " live" : "";
    return '<a class="lnk'+live+'" href="'+esc(l.url)+'"><i class="ti '+esc(l.icon)+'"></i><span>'+esc((l.label||"").toUpperCase())+'</span></a>';
  }).join("");
  var linksBlock = links.length ? '<div class="links">'+linksHtml+'</div>' : '';

  // meta line: client · type
  var metaBits=[];
  if(present(p.client)) metaBits.push(esc(p.client));
  if(present(p.type)) metaBits.push(esc(p.type));
  var metaHtml = metaBits.join(' · ');

  var html =
  '<div class="card">'+
    '<div class="strip" style="background:'+esc(grad)+'"></div>'+
    '<div class="body">'+
      '<div class="head">'+
        '<div class="mono" style="background:'+esc(grad)+'">'+esc(AH.initials(p.name))+'</div>'+
        '<div class="id">'+
          '<div class="name">'+esc(p.name||"")+'</div>'+
          (metaHtml?'<div class="meta">'+metaHtml+'</div>':'')+
        '</div>'+
        (healthLabel?'<span class="health" style="'+healthStyle+'"><span class="dot" style="'+dotStyle+'"></span>'+esc(healthLabel)+'</span>':'')+
      '</div>'+

      '<div class="track-wrap">'+
        '<div class="track-top">'+
          '<span class="track-lbl">Lifecycle</span>'+
          '<span class="track-pct">'+esc(String(prog))+'<span>%</span></span>'+
        '</div>'+
        '<div class="rail" style="--fill:'+fillPct.toFixed(1)+'%">'+
          '<div class="ticks">'+ticks+'</div>'+
        '</div>'+
      '</div>'+

      '<div class="stage">'+
        '<i class="ti '+esc(stageIcon)+'"></i><span>Stage</span> <b>'+esc(stageLabel)+'</b>'+
        extraHtml+
      '</div>'+

      linksBlock+

      '<div class="foot">'+
        '<span class="updated"><i class="ti ti-clock"></i>Updated '+esc(AH.updated(p))+'</span>'+
      '</div>'+

    '</div>'+
  '</div>';

  return html;
},
"d6": function(p){
  var h = AH.health(p.health);
  var mono = AH.esc(AH.initials(p.name));
  var name = AH.esc(p.name);
  var type = AH.present(p.type) ? AH.esc(p.type) : "";

  if (progress < 0) progress = 0; if (progress > 100) progress = 100;

  var links = AH.links(p) || [];
  var tiles = links.map(function(l){
    var cls = "d6-tile" + (l.key === "live" ? " d6-live" : "");

      '<i class="ti ' + AH.esc(l.icon) + '"></i>' +
      '<span>' + AH.esc((l.label || "").toUpperCase()) + '</span>' +
    '</a>';
  }).join("");
  var tilesBlock = tiles ? '<div class="d6-tiles">' + tiles + '</div>' : "";

  var monoStyle = AH.present(p.coverGradient)

    : '';

  var healthStyle = ' style="color:' + AH.esc(h.color) + ';background:' + AH.esc(h.bg) + '"';
  var dotStyle = ' style="background:' + AH.esc(h.dot) + '"';

  var stageBlock = stageLabel
    ? '<div class="d6-stagebar">' +
        '<i class="ti ' + AH.esc(stageIcon) + '"></i>' +
        '<span>' + stageLabel + '</span>' +
        '<span class="d6-line"></span>' +
      '</div>'
    : '';

  var html =
    '<div class="d6-head">' +
      '<div class="d6-mono"' + monoStyle + '>' + mono + '</div>' +
      '<div class="d6-id">' +
        '<div class="d6-name">' + name + '</div>' +
        (sub ? '<div class="d6-sub">' + sub + '</div>' : '') +
      '</div>' +
      '<div class="d6-health"' + healthStyle + '>' +
        '<span class="d6-dot"' + dotStyle + '></span>' + AH.esc(h.label) +
      '</div>' +
    '</div>' +
    stageBlock +
    tilesBlock +
    '<div class="d6-foot">' +
      '<div class="d6-prog">' +
        '<div class="d6-track"><div class="d6-fill" style="width:' + progress + '%"></div></div>' +
        '<div class="d6-pct">' + progress + '%</div>' +
      '</div>' +
      '<div class="d6-updated">' +
        '<i class="ti ti-clock"></i><span>Updated ' + AH.esc(AH.updated(p)) + '</span>' +
      '</div>' +
    '</div>';

  return html;
},

"d9": function(p){
  var h = AH.health(p.health);
  var sub = [AH.esc(p.client||''), AH.esc(p.type||'')].filter(Boolean).join(' · ');
  var stageKey = p.stage||'';
  var stageLabel = AH.STAGE[stageKey]||stageKey;
  var stageIcon = AH.STAGE_ICON[stageKey]||'ti-flag';
  var prog = (p.progress!=null?p.progress:0);

  // links: live becomes the primary CTA; the rest go in the segmented nav
  var all = AH.links(p);
  var live = null, rest = [];
  all.forEach(function(l){ if(l.key==='live'){ live = l; } else { rest.push(l); } });

  var html = '<div class="card">';
  html += '<div class="top"><span class="eyebrow">Project</span>'
        + '<span class="updated"><i class="ti ti-clock"></i>'+AH.esc(AH.updated(p))+'</span></div>';

  html += '<div class="mono" style="background:'+AH.esc(p.coverGradient||'linear-gradient(135deg,#6d5efc,#22d3ee)')+'">'
        + AH.esc(AH.initials(p.name))+'</div>';
  html += '<div class="name">'+AH.esc(p.name||'')+'</div>';
  if(sub){ html += '<div class="sub">'+sub+'</div>'; }

  html += '<div class="chips">';
  html += '<span class="chip health" style="color:'+h.color+';background:'+h.bg+';border-color:'+h.border+'">'
        + '<span class="dot" style="background:'+h.dot+';box-shadow:0 0 7px '+h.dot+'"></span>'+AH.esc(h.label)+'</span>';
  if(stageKey){ html += '<span class="chip stage"><i class="ti '+AH.esc(stageIcon)+'"></i>'+AH.esc(stageLabel)+'</span>'; }
  html += '</div>';

  html += '<div class="prog"><div class="prog-head">'
        + '<span class="prog-label">Progress</span>'
        + '<span class="prog-val">'+prog+'<span>%</span></span></div>'
        + '<div class="track"><div class="fill" style="width:'+prog+'%"></div></div></div>';

  if(live){
    html += '<a href="'+AH.esc(live.url)+'" class="cta"><i class="ti '+AH.esc(live.icon)+'"></i>Open '+AH.esc(live.label)+'</a>';
  }

  if(rest.length){
    html += '<nav class="seg" style="grid-template-columns:repeat('+rest.length+',1fr)">';
    rest.forEach(function(l){
      html += '<a href="'+AH.esc(l.url)+'"><i class="ti '+AH.esc(l.icon)+'"></i>'+AH.esc(l.label)+'</a>';
    });
    html += '</nav>';
  }

  var metaParts = [];
  var prs = AH.openPRs(p);
  if(AH.present(p.repoInfo&&p.repoInfo.openPRs)){
    metaParts.push('<span><i class="ti ti-git-pull-request"></i>'+prs+' PRs</span>');
  }
  var lang = AH.language(p);
  if(AH.present(lang)){
    metaParts.push('<span><i class="ti ti-code"></i>'+AH.esc(lang)+'</span>');
  }
  if(metaParts.length){
    html += '<div class="meta">'+metaParts.join('<span class="sep"></span>')+'</div>';
  }

  html += '</div>';
  return html;
},

        '<div class="bar"><span style="width:' + prog + '%;"></span></div>' +

};

fetch('/data/projects.json',{cache:'no-store'}).then(function(r){return r.json();}).then(function(data){
  var ps=(data.projects||[]).filter(function(p){return !p.hidden;});
  var root=document.getElementById('root');
  ORDER.forEach(function(pre,i){
    var sec=document.createElement('section');sec.className='cmp';
    var cards='';
    ps.forEach(function(p){try{cards+='<div class="'+pre+'">'+window.R[pre](p)+'</div>';}catch(e){cards+='<div style="color:#f87171;font:12px monospace;padding:8px">'+pre+' err: '+(e&&e.message)+'</div>';}});
    sec.innerHTML='<div class="hd"><b>D'+(i+1)+'</b><h2>'+NAMES[pre]+'</h2></div><div class="deck">'+cards+'</div>';
    root.appendChild(sec);
  });
}).catch(function(e){document.getElementById('root').textContent='load error: '+e;});
